<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset Password — CLINK">
    <title>Reset Password — CLINK</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="brand">
                <h1>CLINK</h1>
                <p>Smart Outpatient Triage & Scheduling</p>
            </div>

            <h2>Set New Password</h2>
            <p style="color:var(--gray-500);text-align:center;font-size:0.9rem;margin-bottom:var(--space-lg);">
                Please choose a strong password.
            </p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div style="margin-bottom:var(--space-md);">
                        {% for category, message in messages %}
                            <div class="flash-message flash-{{ category }}" style="padding:var(--space-sm) var(--space-md);border-radius:var(--radius-sm);margin-bottom:8px;font-size:0.85rem;background:var(--gray-100);color:var(--gray-700);border-left:4px solid var(--primary-500);">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Min 6 chars, 1 num, 1 special" required autocomplete="new-password">
                </div>

                <div class="form-group" style="margin-top:var(--space-md);">
                    <label class="form-label" for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Confirm your new password" required autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:var(--space-lg);">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</body>
</html>
